<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Kartvizit</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 3px solid white;
        }
        

        h2 {
            margin: 10px 0;
        }

        .info {
            margin: 10px 0;
            font-size: 15px;
        }

        .btn {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            background-color: #285286;
            padding: 10px;
            border: #ffffff solid 2px;
            border-radius: 10px;
        }
    </style>
</head>
